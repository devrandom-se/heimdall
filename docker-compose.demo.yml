services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: heimdall_demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d heimdall_demo"]
      interval: 2s
      timeout: 3s
      retries: 10

  heimdall:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: demo,web
      POSTGRES_URL: jdbc:postgresql://postgres:5432/heimdall_demo
      POSTGRES_USERNAME: demo
      POSTGRES_PASSWORD: demo
      SALESFORCE_BASE_URL: https://demo.salesforce.com
      SALESFORCE_CLIENT_ID: demo
      SALESFORCE_ORG_ID: 00Dxx0000000000
      AWS_S3_BUCKET_NAME: heimdall-demo
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
