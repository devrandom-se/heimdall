# Demo mode profile — runs with Docker Compose PostgreSQL, no external services needed
# Start: docker compose -f docker-compose.demo.yml up -d
# Run:   mvn spring-boot:run -Dspring-boot.run.profiles=demo,web

heimdall.demo=true

# Demo PostgreSQL (port 5433 locally, overridable via env vars for Docker)
postgres.backup.url=${POSTGRES_URL:jdbc:postgresql://localhost:5433/heimdall_demo}
postgres.backup.username=${POSTGRES_USERNAME:demo}
postgres.backup.password=${POSTGRES_PASSWORD:demo}

# Disable batch processing, enable web server
spring.batch.job.enabled=false
spring.main.web-application-type=servlet

# Dummy values for required config (not used in demo mode, overridable via env vars)
salesforce.base-url=${SALESFORCE_BASE_URL:https://demo.salesforce.com}
salesforce.client-id=${SALESFORCE_CLIENT_ID:demo}
salesforce.org-id=${SALESFORCE_ORG_ID:00Dxx0000000000}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:heimdall-demo}

# Disable features that require external services
heimdall.skip-checksum-cache=true
heimdall.metadata.auto-migrate=false
